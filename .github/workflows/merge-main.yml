name: Merge main

permissions:
  contents: write
  pull-requests: read

on:
  pull_request:
    paths:
      - '.github/workflows/merge-main.yml'
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number to merge main into'
        required: true
        type: number

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}-${{ github.event_name }}"
  cancel-in-progress: true

jobs:
  merge-main:
    if: github.event_name == 'workflow_dispatch' || github.repository == 'JabRef/jabref'
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR branch
        if: github.event_name == 'workflow_dispatch'
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_JABREF_MACHINE_PR_APPROVE || github.token }}
        run: |
          gh pr view "${{ inputs.pr }}" --repo "${{ github.repository }}" --json headRefName,headRepositoryOwner,headRepository \
            --jq '"branch=\(.headRefName)\nrepo=\(.headRepositoryOwner.login)/\(.headRepository.name)"' >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          repository: ${{ steps.resolve.outputs.repo || github.repository }}
          submodules: 'true'
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.branch || github.head_ref }}
          token: ${{ secrets.GH_TOKEN_JABREF_MACHINE_PR_APPROVE || github.token }}

      # The PR may live in a fork ("repository" above); always merge main of JabRef/jabref
      - name: Fetch upstream main
        run: |
          set -ex
          git remote add upstream "https://github.com/JabRef/jabref.git" || true
          git fetch upstream main

      - name: Merge main
        uses: maven-flow/merge@1a008472b7a881f9fa6779c53e0118cdaf66da22 # v1
        with:
          changelog-file: CHANGELOG.md
          changelog-rebase: true
          pom-file: 'match-nothing.txt'
          source-branch: 'upstream/main'
          target-branch: ${{ steps.resolve.outputs.branch || github.head_ref }}
          # Push the merge commit back to the PR branch (the reason this workflow exists).
          push-changes: true
