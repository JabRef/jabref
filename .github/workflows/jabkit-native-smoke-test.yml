name: JabKit Native Smoke Test

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  native-smoke-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'true'
          show-progress: 'false'

      - uses: ./.github/actions/setup-gradle
        with:
          distribution: graalvm

      - name: Build JabKit native binary
        run: gradle :jabkit:nativeCompile

      - name: Install clitest
        uses: ethanjli/cached-download-action@v0.1.4
        with:
          url: https://raw.githubusercontent.com/aureliojargas/clitest/master/clitest
          destination: /tmp/clitest

      - name: Make clitest executable
        run: chmod +x /tmp/clitest

      - name: Run JabKit native smoke tests
        run: cd jabkit && /tmp/clitest src/test/nativeimage/jabkit.md

      - name: Upload JabKit native binary
        uses: actions/upload-artifact@v7
        with:
          name: jabkit-native-${{ matrix.os }}
          path: jabkit/build/native/nativeCompile/jabkit
