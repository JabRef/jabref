name: JabKit Native Smoke Test

on:
  push:
    branches:
      - main
      - main-release
    paths-ignore:
      - 'docs/**'
      - 'src/test/**'
      - 'README.md'
    tags:
      - '*'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'src/test/**'
      - 'README.md'
  workflow_dispatch:
    inputs:
      run-online-tests:
        description: 'Run online JabKit smoke tests'
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: read

jobs:
  native-smoke-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: 'true'
          show-progress: 'false'

      - uses: ./.github/actions/setup-gradle
        with:
          distribution: graalvm

      - name: Build JabKit native binary
        run: gradle :jabkit:nativeCompile

      - name: Install clitest
        uses: ethanjli/cached-download-action@v0.1.4
        with:
          # clitest v0.5.0 (https://github.com/aureliojargas/clitest/releases/tag/0.5.0)
          url: https://raw.githubusercontent.com/aureliojargas/clitest/8bdaae2f56e524f8824307d5c443e6353fe0dbd9/clitest
          destination: /tmp/clitest

      - name: Make clitest executable
        run: chmod +x /tmp/clitest

      - name: Run JabKit offline smoke tests
        run: cd jabkit && /tmp/clitest src/test/nativeimage/jabkit-offline.md

      - name: Run JabKit online smoke tests
        if: ${{ inputs.run-online-tests }}
        run: cd jabkit && /tmp/clitest src/test/nativeimage/jabkit-online.md

      - name: Upload JabKit native image (binary + libraries)
        uses: actions/upload-artifact@v7
        with:
          name: jabkit-native-${{ matrix.os }}
          path: jabkit/build/native/nativeCompile/
          if-no-files-found: error
